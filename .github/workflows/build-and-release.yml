name: Build and release

on:
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force a specific version (optional, format: YYYY.M.X)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_DESCRIPTION: Prometheus exporter for Wazuh

# Default permissions for all jobs
permissions:
  contents: read

jobs:
  prepare-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.version.outputs.version }}
      name_lower: ${{ steps.repo.outputs.name_lower }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Generate version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.force_version }}" ]; then
          VERSION="${{ github.event.inputs.force_version }}"
          # Validate format: YYYY.M.X (no leading zeros on month/patch)
          if ! echo "$VERSION" | grep -qE '^[0-9]{4}\.[1-9][0-9]?\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected YYYY.M.X, no leading zeros)"
            exit 1
          fi
          echo "Using forced version: $VERSION"
        else
          # Fetch all tags from remote to ensure we have the latest
          git fetch --tags

          # Current year and month (no leading zero for semver compatibility)
          YEAR=$(date +'%Y')
          MONTH=$(date +'%-m')

          # Get the highest existing tag for current YEAR.MONTH.* and increment patch
          LATEST_TAG=$(git tag -l "v${YEAR}.${MONTH}.*" | sort -V | tail -n 1)

          if [ -z "$LATEST_TAG" ]; then
            # No tags for this year.month, start at .1
            VERSION="${YEAR}.${MONTH}.1"
          else
            # Extract patch number and increment
            PATCH=$(echo "$LATEST_TAG" | sed "s/^v${YEAR}\.${MONTH}\.\([0-9]*\).*/\1/")
            VERSION="${YEAR}.${MONTH}.$((PATCH + 1))"
          fi
        fi

        echo "Generated version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Convert repository name to lowercase
      id: repo
      run: |
        REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        echo "Repository name converted to lowercase: $REPO_LOWER"
        echo "name_lower=$REPO_LOWER" >> $GITHUB_OUTPUT

  build-multiarch-images:
    needs: prepare-build

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        platform:
        - linux/amd64
        - linux/arm64

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract platform architecture
      run: |
        echo "PLATFORM_ARCH=${platform##*/}" >> $GITHUB_ENV
      env:
        platform: ${{ matrix.platform }}

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        platforms: ${{ matrix.platform }}

    - name: Generate Docker metadata and labels
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ needs.prepare-build.outputs.name_lower }}
        tags: |
          type=raw,value=${{ needs.prepare-build.outputs.version }}-${{ env.PLATFORM_ARCH }}
        labels: |
          org.opencontainers.image.title=Wazuh Prometheus exporter
          org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }} (${{ env.PLATFORM_ARCH }})
          org.opencontainers.image.version=${{ needs.prepare-build.outputs.version }}
          org.opencontainers.image.vendor=Maxime Wewer
          org.opencontainers.image.licenses=Apache-2.0
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.url=https://github.com/${{ github.repository }}
          org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
          org.opencontainers.image.created={{ date 'YYYY-MM-DDTHH:mm:ss' tz='Europe/Paris' }}
          org.opencontainers.image.revision=${{ github.sha }}

    - name: Build and push platform-specific image
      id: build
      uses: docker/build-push-action@v7
      env:
        DOCKER_BUILD_SUMMARY: false
      with:
        context: .
        platforms: ${{ matrix.platform }}
        push: true
        provenance: false # Disable provenance to avoid unknown/unknown
        sbom: false # Disable sbom to avoid unknown/unknown
        build-args: |
          VERSION=${{ needs.prepare-build.outputs.version }}
        tags: ${{ steps.meta.outputs.tags }}
        annotations: ${{ steps.meta.outputs.annotations }}
        labels: ${{ steps.meta.outputs.labels }}
        # GHCR preserves manifest-level annotations only for OCI-format images, so
        # build/push with OCI media types; the manifest index is annotated later
        # via `docker buildx imagetools create`.
        outputs: type=image,oci-mediatypes=true

  create-multiarch-manifest:
    needs:
    - prepare-build
    - build-multiarch-images

    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Generate multiarch manifest metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ needs.prepare-build.outputs.name_lower }}
        annotations: |
          type=org.opencontainers.image.description,value=${{ env.IMAGE_DESCRIPTION }}
        tags: |
          type=raw,value=${{ needs.prepare-build.outputs.version }}
          type=raw,value=latest

    - name: Create multiarch manifest and push
      id: manifest-annotate
      run: |
        docker buildx imagetools create \
          $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
          --annotation='index:org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}' \
          --annotation='index:org.opencontainers.image.source=https://github.com/${{ github.repository }}' \
          --annotation='index:org.opencontainers.image.licenses=Apache-2.0' \
          ${{ env.REGISTRY }}/${{ needs.prepare-build.outputs.name_lower }}:${{ needs.prepare-build.outputs.version }}-amd64 \
          ${{ env.REGISTRY }}/${{ needs.prepare-build.outputs.name_lower }}:${{ needs.prepare-build.outputs.version }}-arm64

    - name: Inspect multiarch manifest
      id: inspect
      run: |
        docker buildx imagetools inspect '${{ env.REGISTRY }}/${{ needs.prepare-build.outputs.name_lower }}:${{ needs.prepare-build.outputs.version }}'

  publish-github-release:
    needs:
    - prepare-build
    - create-multiarch-manifest

    runs-on: ubuntu-latest

    permissions:
      contents: write # create the release + tag
      pull-requests: read # gh pr list for the changelog

    steps:
    - name: Checkout repository with full history
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Fetch all history for all tags and branches

    - name: Generate release changelog from PRs and commits
      id: changelog
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ needs.prepare-build.outputs.version }}
      run: |
        # Fetch all tags from remote to ensure we have the latest
        git fetch --tags

        # Get the latest tag (previous version) - only used for comparison URL
        LATEST_TAG=$(git tag -l --sort=-version:refname | head -n 1)

        # Build changelog: last 10 commits and last 10 merged PRs, independent of tags
        CHANGELOG_CONTENT=""

        # Commit range: since previous tag if any, else all history
        if [ -n "$LATEST_TAG" ]; then
          COMMIT_RANGE="${LATEST_TAG}..HEAD"
          echo "Fetching up to 10 commits in range ${COMMIT_RANGE}..."
        else
          COMMIT_RANGE=""
          echo "No previous tag, fetching up to 10 commits from full history..."
        fi
        COMMITS_LIST=$(git log ${COMMIT_RANGE} --no-merges -n 10 --pretty=format:"- \`%h\` %s")

        # PRs merged since previous tag date, capped at 10
        if [ -n "$LATEST_TAG" ]; then
          SINCE_DATE=$(git log -1 --format=%aI "$LATEST_TAG")
          echo "Fetching up to 10 PRs merged since ${SINCE_DATE}..."
          PRS_LIST=$(gh pr list --state merged --base main --limit 10 \
            --search "merged:>=${SINCE_DATE}" \
            --json number,title,url \
            --jq '.[] | "- [#\(.number)](\(.url)) \(.title)"' 2>/dev/null || true)
        else
          PRS_LIST=$(gh pr list --state merged --base main --limit 10 \
            --json number,title,url \
            --jq '.[] | "- [#\(.number)](\(.url)) \(.title)"' 2>/dev/null || true)
        fi

        if [ -n "$COMMITS_LIST" ]; then
          CHANGELOG_CONTENT="#### Commits (last 10)"$'\n'"$COMMITS_LIST"
        fi

        if [ -n "$PRS_LIST" ]; then
          if [ -n "$CHANGELOG_CONTENT" ]; then
            CHANGELOG_CONTENT="$CHANGELOG_CONTENT"$'\n\n'"#### Pull requests (last 10)"$'\n'"$PRS_LIST"
          else
            CHANGELOG_CONTENT="#### Pull requests (last 10)"$'\n'"$PRS_LIST"
          fi
        fi

        if [ -z "$CHANGELOG_CONTENT" ]; then
          CHANGELOG_CONTENT="No changes found."
        fi

        # Save outputs
        {
          echo "CHANGELOG<<EOF"
          echo "$CHANGELOG_CONTENT"
          echo "EOF"
        } >> $GITHUB_OUTPUT

        if [ -n "$LATEST_TAG" ]; then
          echo "COMPARISON_URL=https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...v${VERSION}" >> $GITHUB_OUTPUT
        else
          echo "COMPARISON_URL=https://github.com/${{ github.repository }}/commits/v${VERSION}" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.prepare-build.outputs.version }}
        name: Release ${{ needs.prepare-build.outputs.version }}
        body: |
          ## ${{ env.IMAGE_DESCRIPTION }} v${{ needs.prepare-build.outputs.version }}

          ### Docker Images

          ```bash
          # Pull the released version
          docker pull ${{ env.REGISTRY }}/${{ needs.prepare-build.outputs.name_lower }}:${{ needs.prepare-build.outputs.version }}
          docker pull ${{ env.REGISTRY }}/${{ needs.prepare-build.outputs.name_lower }}:latest
          ```

          ### Changes

          ${{ steps.changelog.outputs.CHANGELOG }}

          ---

          **Full Changelog**: ${{ steps.changelog.outputs.COMPARISON_URL }}
        draft: false
        prerelease: false

  release-helm-chart:
    needs:
    - prepare-build
    - publish-github-release

    runs-on: ubuntu-latest

    permissions:
      contents: write # attach the chart to the release
      packages: write # push the chart to GHCR (OCI)

    env:
      CHART_PATH: charts/wazuh-prometheus-exporter

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Convert repository owner to lowercase
      id: owner
      run: echo "lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: 'latest'

    - name: Stamp the release version into the chart
      env:
        VERSION: ${{ needs.prepare-build.outputs.version }}
      run: |
        # Chart version + appVersion follow the image release tag (CalVer is valid
        # SemVer); also pin image.tag in values.yaml so the published chart deploys
        # exactly the image just built — no separate version to maintain.
        sed -i "s/^version:.*/version: ${VERSION}/" "${CHART_PATH}/Chart.yaml"
        sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "${CHART_PATH}/Chart.yaml"
        sed -i "s/^  tag: .*/  tag: \"${VERSION}\"/" "${CHART_PATH}/values.yaml"
        head -8 "${CHART_PATH}/Chart.yaml"
        grep -A2 '^image:' "${CHART_PATH}/values.yaml"

    - name: Lint chart
      run: helm lint "${CHART_PATH}"

    - name: Package chart
      run: helm package "${CHART_PATH}"

    - name: Log in to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY }}" --username "${{ github.actor }}" --password-stdin

    - name: Push chart to OCI registry
      env:
        VERSION: ${{ needs.prepare-build.outputs.version }}
      run: |
        helm push "wazuh-prometheus-exporter-${VERSION}.tgz" "oci://${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/charts"
        echo "Pushed oci://${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/charts/wazuh-prometheus-exporter:${VERSION}"

    - name: Attach chart to the GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.prepare-build.outputs.version }}
        files: wazuh-prometheus-exporter-${{ needs.prepare-build.outputs.version }}.tgz
        token: ${{ secrets.GITHUB_TOKEN }}
