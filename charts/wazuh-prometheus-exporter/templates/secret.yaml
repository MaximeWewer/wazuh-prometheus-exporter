{{- /* Create a Secret only for an inline password and when not using an existing one. */ -}}
{{- if and .Values.wazuh.password (not .Values.wazuh.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wazuh-exporter.fullname" . }}
  labels:
    {{- include "wazuh-exporter.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.wazuh.password | quote }}
{{- end }}
